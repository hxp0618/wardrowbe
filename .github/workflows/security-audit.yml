name: security-audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r backend/requirements.txt -r backend/requirements-extras.txt

  config-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: '! rg -n ''NODE_TLS_REJECT_UNAUTHORIZED:\s*"0"'' docker-compose*.yml'
